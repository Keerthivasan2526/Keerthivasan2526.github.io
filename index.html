<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* Background styling */
        body {
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Glass effect card */
        .container {
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            color: white;
            width: 350px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        /* Profile image */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid white;
            margin-bottom: 15px;
        }

        /* Headings */
        h1 {
            margin-bottom: 10px;
            font-size: 28px;
        }

        h3 {
            margin-bottom: 15px;
            font-weight: normal;
            color: #ddd;
        }

        /* Paragraph */
        p {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        /* Button */
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #00c6ff;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0072ff;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/120" alt="Profile" class="profile-img">

        <h1>KEERTHIVASAN R</h1>
        <h3>Student | Developer | Designer</h3>

        <p>
            Hi, I am a passionate student interested in technology, AI, and building cool projects.
            I love learning new things and creating innovative solutions.
        </p>

        <a href="#" class="btn">Contact Me</a>
    </div>

</body>
</html>
